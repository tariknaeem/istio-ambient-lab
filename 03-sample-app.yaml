apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: platform
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello from Platform namespace! Istio Ambient Mode is active."
            - "-listen=:8080"
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: platform
  labels:
    app: sample-app
spec:
  selector:
    app: sample-app
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
