name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML manifests
        run: |
          pip install pyyaml -q
          FAILED=0
          for f in *.yaml; do
            echo "Validating $f..."
            python3 -c "
import yaml, sys
with open('$f') as fh:
    docs = list(yaml.safe_load_all(fh))
    print(f'  {len(docs)} document(s) OK')
" || FAILED=1
          done
          exit $FAILED
